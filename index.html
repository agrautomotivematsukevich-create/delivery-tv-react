<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <!--
      ===== SEO Fallback =====
      These are default values for crawlers that don't execute JS.
      react-helmet-async dynamically overrides title, description,
      canonical, OG and Twitter tags on each route change.
    -->
    <title>AGR Warehouse — Система управления поставками</title>
    <meta name="description" content="AGR Warehouse — интерактивная платформа управления складскими операциями: приёмка, логистика, отслеживание лотов, аналитика простоев." />
    <!-- canonical intentionally omitted here — set dynamically by PageMeta per route -->

    <!-- ===== Viewport (accessibility-safe) ===== -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ===== Favicon & PWA ===== -->
    <link rel="icon" type="image/svg+xml" href="/agr-logo-white.svg" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <meta name="theme-color" content="#191B25" />

    <!-- ===== Open Graph fallback (overridden per-route by Helmet) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AGR Warehouse" />
    <meta property="og:image" content="https://agr-warehouse.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- ===== Technical SEO ===== -->
    <meta name="robots" content="index, follow" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ===== Fonts (preconnect for speed) ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

    <!-- ===== Structured Data (JSON-LD) ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://agr-warehouse.vercel.app/#organization",
          "name": "AGR Warehouse",
          "url": "https://agr-warehouse.vercel.app",
          "logo": {
            "@type": "ImageObject",
            "url": "https://agr-warehouse.vercel.app/agr-logo-white.svg"
          },
          "description": "Платформа управления складскими операциями и логистикой в реальном времени."
        },
        {
          "@type": "WebSite",
          "@id": "https://agr-warehouse.vercel.app/#website",
          "name": "AGR Warehouse",
          "url": "https://agr-warehouse.vercel.app",
          "publisher": { "@id": "https://agr-warehouse.vercel.app/#organization" },
          "inLanguage": ["ru-RU", "en-US"]
        },
        {
          "@type": "WebApplication",
          "@id": "https://agr-warehouse.vercel.app/#app",
          "name": "AGR Warehouse Dashboard",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Any",
          "browserRequirements": "Requires JavaScript. Requires HTML5.",
          "url": "https://agr-warehouse.vercel.app",
          "description": "Real-time warehouse management system with operator terminal, lot tracking, downtime analytics, and logistics monitoring.",
          "offers": {
            "@type": "Offer",
            "price": "0.00",
            "priceCurrency": "USD",
            "availability": "https://schema.org/OnlineOnly"
          },
          "author": { "@id": "https://agr-warehouse.vercel.app/#organization" },
          "featureList": [
            "Real-time dashboard with zone status",
            "Operator task terminal",
            "Arrival analytics and carrier stats",
            "Zone downtime monitoring",
            "Lot tracking and movement history",
            "Logistics overview",
            "Operations history with photo reports",
            "Multi-language support (RU/EN/CN)",
            "PWA with offline mode"
          ]
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
