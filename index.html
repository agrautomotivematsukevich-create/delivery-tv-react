<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/agr-logo-white.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AGR Warehouse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              bg: '#191B25',
              'card-bg': 'rgba(58, 60, 78, 0.35)',
              'accent-green': '#00E676',
              'accent-yellow': '#E89F64',
              'accent-red': '#FF3B30',
              'accent-blue': '#1E7D7D',
              'accent-purple': '#053838',
              'accent-gold': '#E89F64',
              'agr-dark': '#3A3C4E',
              'agr-gray': '#5C5E74',
              'agr-light': '#BDBFD1',
              'agr-green': '#1E7D7D',
              'agr-dark-green': '#053838',
              'agr-orange': '#E89F64',
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #191B25;
        color: white;
        background-image: 
          radial-gradient(circle at 20% 20%, rgba(30, 125, 125, 0.12) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(5, 56, 56, 0.10) 0%, transparent 50%);
        background-attachment: fixed;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: rgba(30, 125, 125, 0.4); border-radius: 4px; }
      ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
    </style>
